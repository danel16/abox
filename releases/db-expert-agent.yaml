apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: db-expert-agent
  namespace: kagent
spec:
  type: BYO
  description: "Database expert agent for querying and analyzing PostgreSQL/MySQL databases in the cluster"
  byo:
    deployment:
      image: ghcr.io/danel16/abox/db-expert-agent:latest
      imagePullPolicy: Always
      env:
      - name: DB_MCP_URL
        value: "http://db-mcp.kagent.svc.cluster.local:3000/mcp"
      - name: OPENAI_API_KEY
        valueFrom:
          secretKeyRef:
            name: kagent-openai
            key: OPENAI_API_KEY
      - name: OPENAI_BASE_URL
        value: "http://agentgateway-external.agentgateway-system/v1"
      - name: PHOENIX_COLLECTOR_ENDPOINT
        value: "http://phoenix.phoenix.svc.cluster.local:6006"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: db-expert-agent
  namespace: kagent
spec:
  parentRefs:
  - name: agentgateway-external
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /db-agent
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: db-expert-agent
      port: 8080
