apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: mcp-security-governance
  namespace: flux-system
spec:
  interval: 24h
  url: https://github.com/techwithhuz/mcp-security-governance
  ref:
    branch: main
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-security-governance
  namespace: flux-system
spec:
  interval: 24h
  chart:
    spec:
      chart: charts/mcp-governance
      sourceRef:
        kind: GitRepository
        name: mcp-security-governance
  targetNamespace: mcp-governance
  install:
    createNamespace: true
  values:
    controller:
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-controller
        tag: latest
        pullPolicy: IfNotPresent
    dashboard:
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-dashboard
        tag: latest
        pullPolicy: IfNotPresent
